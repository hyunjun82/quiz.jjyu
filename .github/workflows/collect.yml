name: 정답 자동 수집·발행

on:
  schedule:
    # 10분 간격, 한국시간 06:00 ~ 24:00 (UTC 21:00~15:00)
    # GitHub Actions cron은 UTC 기준. 부하에 따라 몇 분 지연될 수 있음.
    - cron: '*/10 21-23 * * *'
    - cron: '*/10 0-14 * * *'
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 정답 수집
        run: node scripts/collect.mjs

      - name: 변경 시에만 커밋·푸시
        run: |
          git config user.name "quizday-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/answers/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(TZ=Asia/Seoul date '+%m/%d %H:%M') 정답 업데이트"
            git push
          fi
